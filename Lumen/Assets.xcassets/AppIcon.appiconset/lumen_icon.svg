<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <linearGradient id="beam" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#667eea"/>
      <stop offset="100%" stop-color="#764ba2"/>
    </linearGradient>
    <linearGradient id="doc" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#e8e8f0"/>
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect width="1024" height="1024" rx="180" fill="url(#bg)"/>

  <!-- Light beams emanating from document -->
  <polygon points="340,820 220,550 320,500 380,680" fill="url(#beam)" opacity="0.6"/>
  <polygon points="340,820 450,520 540,560 420,720" fill="url(#beam)" opacity="0.5"/>
  <polygon points="340,820 580,480 680,540 480,720" fill="url(#beam)" opacity="0.4"/>

  <!-- Main document shape -->
  <rect x="320" y="280" width="380" height="480" rx="24" fill="url(#doc)"/>

  <!-- Document fold corner -->
  <path d="M580 280 L700 280 L700 400 Z" fill="#c8c8d8"/>
  <path d="M580 280 L700 400 L580 400 Z" fill="#e0e0ec"/>

  <!-- "L" letterform on document -->
  <rect x="380" y="480" width="40" height="200" rx="6" fill="#667eea"/>
  <rect x="380" y="640" width="140" height="40" rx="6" fill="#667eea"/>

  <!-- PDF text lines -->
  <rect x="380" y="380" width="240" height="24" rx="6" fill="#c8c8d8"/>
  <rect x="380" y="420" width="200" height="24" rx="6" fill="#d8d8e4"/>

  <!-- Small light burst at top right -->
  <circle cx="780" cy="240" r="40" fill="#ffd700" opacity="0.9"/>
  <circle cx="780" cy="240" r="60" fill="#ffd700" opacity="0.3"/>
  <circle cx="780" cy="240" r="80" fill="#ffd700" opacity="0.1"/>
</svg>
