name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build and Release
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build
        run: xcodebuild -project Lumen.xcodeproj -scheme Lumen -configuration Release build CODE_SIGNING_ALLOWED=NO

      - name: Package as zip
        run: ditto -ck --sequesterRsrc --keepParent build/Release/Lumen.app Lumen.zip

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: Lumen.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
