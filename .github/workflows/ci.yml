name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build
    runs-on: macos-latest

    strategy:
      matrix:
        xcode_version:
          - '16.3'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_${{ matrix.xcode_version }}.app/Contents/Developer

      - name: Build
        run: xcodebuild -project Lumen.xcodeproj -scheme Lumen -configuration Release build CODE_SIGNING_ALLOWED=NO